<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeetSpace — Room Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F5F0;
      --surface: #FFFFFF;
      --surface2: #F0F0EA;
      --border: #E2E2DC;
      --text: #1A1A18;
      --text-muted: #7A7A72;
      --text-light: #AEAEA6;
      --accent: #2563EB;
      --accent-light: #EEF2FF;
      --accent-hover: #1D4ED8;
      --green: #16A34A;
      --green-light: #F0FDF4;
      --amber: #D97706;
      --amber-light: #FFFBEB;
      --red: #DC2626;
      --red-light: #FEF2F2;
      --floor22: #7C3AED;
      --floor23: #0891B2;
      --floor25: #059669;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
      padding: 0 24px; height: 60px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Instrument Serif', serif; font-size: 20px; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .topbar-nav { display: flex; gap: 4px; margin-left: auto; }
    .tab-btn { padding: 6px 14px; border-radius: 20px; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all .15s; }
    .tab-btn.active { background: var(--accent); color: #fff; }
    .tab-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .btn-primary { padding: 8px 18px; background: var(--accent); color: #fff; border: none; border-radius: 20px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s; }
    .btn-primary:hover { background: var(--accent-hover); }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #6366F1, #8B5CF6); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; margin-left: 8px; }

    /* ── LAYOUT ── */
    .layout { display: flex; height: calc(100vh - 60px); }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px; min-width: 260px; background: var(--surface);
      border-right: 1px solid var(--border); overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .mini-cal { padding: 20px 16px 12px; }
    .mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .mini-cal-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .mini-day-label { font-size: 10px; font-weight: 600; color: var(--text-light); text-align: center; padding: 2px 0 4px; text-transform: uppercase; letter-spacing: .4px; }
    .mini-day { font-size: 12px; text-align: center; padding: 4px 2px; border-radius: 6px; cursor: pointer; color: var(--text-muted); transition: all .12s; }
    .mini-day:hover { background: var(--surface2); color: var(--text); }
    .mini-day.selected { background: var(--accent); color: #fff; font-weight: 600; }
    .mini-day.has-event::after { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); margin: 1px auto 0; }
    .mini-day.selected::after { background: rgba(255,255,255,.7); }

    .sidebar-section { padding: 12px 16px 6px; }
    .sidebar-section-title { font-size: 10px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
    
    .filter-input { width: 100%; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color .15s; margin-bottom: 8px; }
    .filter-input:focus { border-color: var(--accent); }

    .floor-filter { display: flex; flex-direction: column; gap: 2px; }
    .floor-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: background .12s; }
    .floor-item:hover { background: var(--surface2); }
    .floor-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .floor-item label { font-size: 13px; color: var(--text); cursor: pointer; flex: 1; }
    .floor-item input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }

    .room-floor-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; display: inline-block; }
    .f22 { background: #F3EFFE; color: var(--floor22); }
    .f23 { background: #E0F7FB; color: var(--floor23); }
    .f25 { background: #ECFDF5; color: var(--floor25); }

    /* ── CALENDAR MAIN (TIMELINE) ── */
    .cal-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
    .cal-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .cal-nav { display: flex; align-items: center; gap: 8px; }
    .cal-nav-btn { width: 32px; height: 32px; border: 1px solid var(--border); background: var(--surface); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 16px; transition: all .12s; }
    .cal-nav-btn:hover { background: var(--surface2); border-color: #ccc; color: var(--text); }
    .cal-period { font-size: 16px; font-weight: 600; color: var(--text); min-width: 180px; }
    .btn-today { padding: 6px 14px; border: 1px solid var(--border); background: var(--surface); border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text); cursor: pointer; transition: all .12s; }
    .btn-today:hover { background: var(--surface2); }
    
    .view-toggle { display: flex; background: var(--surface2); border-radius: 8px; padding: 2px; margin-left: auto; }
    .view-btn { padding: 5px 12px; border-radius: 6px; border: none; background: transparent; font-size: 12px; font-weight: 500; color: var(--text-muted); transition: all .15s; }
    .view-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }

    /* TIMELINE GRID */
    .timeline { flex: 1; overflow: auto; display: flex; flex-direction: column; position: relative; }
    
    .tl-header-row { display: flex; position: sticky; top: 0; z-index: 50; background: var(--surface); border-bottom: 1px solid var(--border); min-width: max-content; }
    .tl-corner { width: 220px; min-width: 220px; border-right: 1px solid var(--border); position: sticky; left: 0; background: var(--surface); z-index: 60; padding: 12px 20px; display: flex; align-items: center; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .tl-hours { display: flex; flex: 1; }
    .tl-hour { width: 80px; min-width: 80px; border-right: 1px solid var(--border); padding: 12px 8px; font-size: 11px; font-weight: 600; color: var(--text-light); text-align: center; }

    /* Ditambahkan: position relative agar garis NOW menyangkut di dalam body */
    .tl-body { display: flex; flex-direction: column; min-width: max-content; position: relative; }
    .tl-row { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); transition: background .15s; }
    .tl-row:hover { background: #F8F8F8; }
    
    .tl-room-info { width: 220px; min-width: 220px; border-right: 1px solid var(--border); position: sticky; left: 0; background: inherit; z-index: 40; padding: 14px 20px; display: flex; flex-direction: column; justify-content: center; }
    .tl-room-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .tl-room-meta { font-size: 11px; color: var(--text-muted); margin-top: 6px; display: flex; align-items: center; gap: 8px; }
    
    .tl-lanes { display: flex; flex: 1; position: relative; cursor: pointer; }
    .tl-lanes:hover::before { content: '+ Klik untuk Booking Ruangan Ini'; position: absolute; left: 20px; top: 50%; transform: translateY(-50%); font-size: 11px; font-weight: 600; color: var(--accent); opacity: 0.8; z-index: 5; pointer-events: none; }
    
    .tl-grid-line { width: 80px; min-width: 80px; border-right: 1px solid var(--border); position: relative; box-sizing: border-box; pointer-events: none; }
    .tl-grid-line::after { content: ''; position: absolute; top: 0; bottom: 0; left: 50%; border-left: 1px dashed var(--border); opacity: 0.4; }

    .tl-event { position: absolute; top: 8px; bottom: 8px; border-radius: 6px; padding: 6px 10px; overflow: hidden; cursor: pointer; z-index: 10; border-left: 3px solid transparent; transition: all .15s; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; justify-content: center; }
    .tl-event:hover { transform: translateY(-1px); box-shadow: var(--shadow); z-index: 20; filter: brightness(0.95); }
    
    .ev-blue { background: #DBEAFE; border-left-color: var(--accent); }
    .ev-purple { background: #EDE9FE; border-left-color: #7C3AED; }
    .ev-teal { background: #CFFAFE; border-left-color: #0891B2; }
    .ev-green { background: #D1FAE5; border-left-color: #059669; }
    .ev-amber { background: #FEF3C7; border-left-color: #D97706; }
    
    .ev-title { font-size: 11px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
    .ev-org { font-size: 10px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── USER FRIENDLY "NOW" INDICATOR ── */
    .now-indicator {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      /* Dibuat putus-putus dan warna biru agar soft */
      background: repeating-linear-gradient(to bottom, rgba(37,99,235,0.4) 0, rgba(37,99,235,0.4) 6px, transparent 6px, transparent 12px);
      z-index: 45;
      pointer-events: none;
    }
    .now-badge {
      position: absolute;
      top: 8px;
      left: -42px; /* Ditarik ke tengah */
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(37,99,235,0.3);
    }
    /* Segitiga kecil di atas badge */
    .now-badge::after {
      content: '';
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 0 4px 5px 4px;
      border-style: solid;
      border-color: transparent transparent var(--accent) transparent;
    }

    /* ── MODALS & POPOVER ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 500; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .booking-modal { background: var(--surface); border-radius: 20px; width: 460px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); transform: translateY(12px) scale(.97); transition: all .25s cubic-bezier(.34,1.56,.64,1); }
    .modal-overlay.open .booking-modal { transform: translateY(0) scale(1); }
    .modal-header { padding: 24px 24px 0; display: flex; align-items: flex-start; justify-content: space-between; }
    .modal-title { font-size: 18px; font-weight: 600; color: var(--text); }
    .modal-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .modal-close { width: 32px; height: 32px; border: none; background: var(--surface2); border-radius: 8px; cursor: pointer; color: var(--text-muted); font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background .12s; }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 20px 24px 24px; display: flex; flex-direction: column; gap: 16px; }
    .form-row { display: flex; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .form-input, .form-select { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; }
    .form-input:focus, .form-select:focus { border-color: var(--accent); background: #fff; }
    .time-slots-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .time-chip { padding: 7px 4px; text-align: center; border: 1.5px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all .15s; }
    .time-chip:hover:not(.booked) { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .time-chip.selected { border-color: var(--accent); background: var(--accent); color: #fff; }
    .time-chip.booked { background: var(--surface2); color: var(--text-light); cursor: not-allowed; text-decoration: line-through; }
    .modal-footer { padding: 0 24px 24px; display: flex; gap: 10px; }
    .btn-cancel { flex: 1; padding: 11px; border: 1.5px solid var(--border); background: transparent; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--text-muted); cursor: pointer; }
    .btn-book { flex: 2; padding: 11px; background: var(--accent); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: #fff; cursor: pointer; }

    .popover { position: fixed; width: 320px; background: var(--surface); border-radius: 16px; box-shadow: var(--shadow-lg); z-index: 600; overflow: hidden; opacity: 0; pointer-events: none; transform: scale(.92); transition: all .18s cubic-bezier(.34,1.2,.64,1); }
    .popover.open { opacity: 1; pointer-events: all; transform: scale(1); }
    .pop-header { padding: 16px; color: #fff; position: relative; }
    .pop-header-blue { background: linear-gradient(135deg, #2563EB, #3B82F6); }
    .pop-header-purple { background: linear-gradient(135deg, #7C3AED, #9F67FA); }
    .pop-header-teal { background: linear-gradient(135deg, #0891B2, #22D3EE); }
    .pop-header-green { background: linear-gradient(135deg, #059669, #34D399); }
    .pop-header-amber { background: linear-gradient(135deg, #D97706, #F59E0B); }
    .pop-title { font-size: 15px; font-weight: 700; }
    .pop-room { font-size: 12px; opacity: .85; margin-top: 2px; }
    .pop-time { font-size: 12px; opacity: .85; margin-top: 1px; }
    .pop-close { position: absolute; top: 12px; right: 12px; width: 26px; height: 26px; border-radius: 6px; border: none; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .pop-body { padding: 14px 16px; }
    .pop-organizer { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .pop-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .pop-org-info { flex: 1; }
    .pop-org-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .pop-org-div { font-size: 11px; color: var(--text-muted); }
    .pop-actions { display: flex; gap: 8px; margin-top: 12px; }
    .pop-btn { flex: 1; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; border: none; }
    .pop-btn-primary { background: var(--accent); color: #fff; }
    .pop-btn-ghost { background: var(--surface2); color: var(--text-muted); }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: #fff; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; z-index: 700; opacity: 0; transition: all .3s; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-lg); pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-icon { width: 20px; height: 20px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; font-size: 11px; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>MeetSpace</div>
    <div class="topbar-nav">
      <button class="tab-btn active">Kalender</button>
      <button class="tab-btn">My Booking</button>
      <button class="tab-btn">Semua Ruangan</button>
    </div>
    <button class="btn-primary" onclick="openBookingModal()">
      <span>+</span> Booking Ruangan
    </button>
    <div class="user-avatar" title="Ahmad Rizki">AR</div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="mini-cal">
        <div class="mini-cal-header">
          <span class="mini-cal-title">April 2026</span>
        </div>
        <div class="mini-grid" id="miniGrid">
          <div class="mini-day-label">M</div><div class="mini-day-label">T</div><div class="mini-day-label">W</div><div class="mini-day-label">T</div><div class="mini-day-label">F</div><div class="mini-day-label">S</div><div class="mini-day-label">S</div>
          </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">Kapasitas Minimum</div>
        <input type="number" id="capFilter" class="filter-input" placeholder="Cari misal: 10" oninput="renderTimeline()">
      </div>

      <div class="sidebar-section" style="padding-top:0;">
        <div class="sidebar-section-title">Filter Lantai</div>
        <div class="floor-filter">
          <label class="floor-item">
            <div class="floor-dot" style="background:var(--floor22)"></div>
            <span style="font-size:13px;color:var(--text);flex:1">22nd Floor</span>
            <input type="checkbox" value="22ND FLOOR" checked onchange="renderTimeline()">
          </label>
          <label class="floor-item">
            <div class="floor-dot" style="background:var(--floor23)"></div>
            <span style="font-size:13px;color:var(--text);flex:1">23rd Floor</span>
            <input type="checkbox" value="23RD FLOOR" checked onchange="renderTimeline()">
          </label>
          <label class="floor-item">
            <div class="floor-dot" style="background:var(--floor25)"></div>
            <span style="font-size:13px;color:var(--text);flex:1">25th Floor</span>
            <input type="checkbox" value="25TH FLOOR" checked onchange="renderTimeline()">
          </label>
        </div>
      </div>
    </div>

    <div class="cal-main">
      <div class="cal-header">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeDay(-1)">‹</button>
          <button class="btn-today" onclick="setToday()">Hari Ini</button>
          <button class="cal-nav-btn" onclick="changeDay(1)">›</button>
        </div>
        <div class="cal-period" id="currentDateDisplay">Rabu, 22 April 2026</div>
        <div class="view-toggle">
          <button class="view-btn active">Timeline Ruangan</button>
        </div>
      </div>

      <div class="timeline" id="timelineContainer">
        <div class="tl-header-row">
          <div class="tl-corner">DAFTAR RUANGAN</div>
          <div class="tl-hours" id="tlHours">
            </div>
        </div>
        <div class="tl-body" id="tlBody">
          </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="bookingOverlay" onclick="closeOnOverlay(event,'bookingOverlay')">
    <div class="booking-modal">
      <div class="modal-header">
        <div>
          <div class="modal-title">Booking Ruangan</div>
          <div class="modal-subtitle" id="modalDateLabel"></div>
        </div>
        <button class="modal-close" onclick="closeModal('bookingOverlay')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Judul Meeting</label>
          <input class="form-input" placeholder="Contoh: Sprint Planning Q2" id="meetTitle">
        </div>
        
        <div class="form-group">
          <label class="form-label">Ruangan Terpilih</label>
          <input class="form-input" id="selectedRoomDisplay" readonly style="background: var(--surface2); font-weight: 600; color: var(--accent);">
        </div>

        <div class="form-group">
          <label class="form-label">Waktu Mulai & Selesai</label>
          <div class="time-slots-grid" id="timeSlots"></div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">Pilih slot awal, lalu slot akhir. Setiap slot = 30 menit.</div>
        </div>

        <div class="form-group">
          <label class="form-label">Peserta (opsional)</label>
          <input class="form-input" placeholder="Tambah nama atau email..." id="attendees">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal('bookingOverlay')">Batal</button>
        <button class="btn-book" onclick="confirmBooking()">✓ Konfirmasi Booking</button>
      </div>
    </div>
  </div>

  <div class="popover" id="eventPopover">
    <div class="pop-header pop-header-blue" id="popHeader">
      <button class="pop-close" onclick="closePopover()">✕</button>
      <div class="pop-title" id="popTitle"></div>
      <div class="pop-room" id="popRoom"></div>
      <div class="pop-time" id="popTime"></div>
    </div>
    <div class="pop-body">
      <div class="pop-organizer">
        <div class="pop-avatar" id="popAvatar"></div>
        <div class="pop-org-info">
          <div class="pop-org-name" id="popOrg"></div>
          <div class="pop-org-div" id="popDiv"></div>
        </div>
      </div>
      <div class="pop-attendees" id="popAttendees"></div>
      <div class="pop-actions">
        <button class="pop-btn pop-btn-ghost" onclick="closePopover()">Tutup</button>
        <button class="pop-btn pop-btn-primary">Detail Lengkap</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span id="toastMsg">Booking berhasil!</span>
  </div>

  <script>
    // ── DATA ──
    const ROOMS = [
      { name:'JAKARTA', floor:'25TH FLOOR', cap:41 },
      { name:'SURABAYA', floor:'25TH FLOOR', cap:10 },
      { name:'BALI', floor:'25TH FLOOR', cap:12 },
      { name:'YOGYAKARTA', floor:'25TH FLOOR', cap:10 },
      { name:'SEMARANG', floor:'25TH FLOOR', cap:10 },
      { name:'MADIUN', floor:'23RD FLOOR', cap:12 },
      { name:'KEDIRI', floor:'23RD FLOOR', cap:12 },
      { name:'PURWOKERTO', floor:'23RD FLOOR', cap:12 },
      { name:'BATAM', floor:'23RD FLOOR', cap:12 },
      { name:'BENGKULU', floor:'23RD FLOOR', cap:10 },
      { name:'JAMBI', floor:'23RD FLOOR', cap:12 },
      { name:'PALEMBANG', floor:'23RD FLOOR', cap:10 },
      { name:'RIAU', floor:'23RD FLOOR', cap:10 },
      { name:'PONTIANAK', floor:'22ND FLOOR', cap:10 },
      { name:'BANJARMASIN', floor:'22ND FLOOR', cap:10 },
      { name:'PALU', floor:'22ND FLOOR', cap:6 },
      { name:'KENDARI', floor:'22ND FLOOR', cap:6 },
      { name:'AMBON', floor:'22ND FLOOR', cap:6 }
    ];

    const EVENTS = [
      { id:1, title:'Sprint Planning', room:'JAKARTA', date:2, startH:9, startM:0, endH:10, endM:30, organizer:'Ahmad Rizki', division:'Product Team', attendees:8, color:'blue', colorHex:'#6366F1' },
      { id:2, title:'1:1 Review', room:'BALI', date:2, startH:9, startM:0, endH:10, endM:0, organizer:'Siti Rahayu', division:'Engineering', attendees:2, color:'green', colorHex:'#059669' },
      { id:3, title:'Design Sync', room:'PONTIANAK', date:2, startH:9, startM:15, endH:11, endM:0, organizer:'Dewi Lestari', division:'Design', attendees:5, color:'purple', colorHex:'#7C3AED' },
      { id:4, title:'Vendor Call', room:'MADIUN', date:2, startH:9, startM:30, endH:11, endM:30, organizer:'Rudi Hartono', division:'Procurement', attendees:6, color:'teal', colorHex:'#0891B2' },
      { id:5, title:'Budget Meet', room:'SURABAYA', date:2, startH:10, startM:0, endH:11, endM:0, organizer:'Mega Wulan', division:'Finance', attendees:5, color:'amber', colorHex:'#D97706' },
      { id:6, title:'IT Support', room:'PALU', date:2, startH:9, startM:0, endH:9, endM:45, organizer:'Joko Susilo', division:'IT', attendees:3, color:'purple', colorHex:'#7C3AED' },
      { id:7, title:'Town Hall', room:'JAKARTA', date:2, startH:13, startM:0, endH:15, endM:0, organizer:'Budi Santoso', division:'HR', attendees:35, color:'blue', colorHex:'#6366F1' },
      { id:8, title:'Onboarding', room:'BATAM', date:2, startH:8, startM:0, endH:9, endM:30, organizer:'Fitri Handa', division:'HR', attendees:10, color:'teal', colorHex:'#0891B2' },
      { id:9, title:'Client Pitch', room:'BALI', date:2, startH:14, startM:0, endH:16, endM:0, organizer:'Andi Darmawan', division:'Sales', attendees:4, color:'green', colorHex:'#059669' },
    ];

    const DAYS_STR = ['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu','Minggu'];
    const DATES = [20,21,22,23,24,25,26]; // week of Apr 20-26
    let currentDateIdx = 2; // Default: Wednesday, Apr 22
    
    const HOURS = Array.from({length:13}, (_,i) => i+8); // 08:00 - 20:00
    const TOTAL_MINS = 12 * 60; // 12 hours total visible

    const floorClass = { '22ND FLOOR':'f22', '23RD FLOOR':'f23', '25TH FLOOR':'f25' };
    const colorClass = { blue:'ev-blue', purple:'ev-purple', teal:'ev-teal', green:'ev-green', amber:'ev-amber' };

    function pad(n) { return String(n).padStart(2,'0'); }

    // ── INITIALIZATION ──
    function init() {
      renderMiniCal();
      renderTimeHeaders();
      updateHeaderDate();
      renderTimeline();
    }

    // ── RENDER MINI CALENDAR ──
    function renderMiniCal() {
      const grid = document.getElementById('miniGrid');
      let html = `<div class="mini-day-label">M</div><div class="mini-day-label">T</div><div class="mini-day-label">W</div><div class="mini-day-label">T</div><div class="mini-day-label">F</div><div class="mini-day-label">S</div><div class="mini-day-label">S</div>`;
      
      html += `<div class="mini-day" style="color:var(--text-light)">30</div><div class="mini-day" style="color:var(--text-light)">31</div>`;
      
      for(let i=1; i<=26; i++) {
        let isCurrentWeek = (i >= 20 && i <= 26);
        let dayIdx = i - 20;
        let isSelected = isCurrentWeek && dayIdx === currentDateIdx;
        let hasEvent = isCurrentWeek && EVENTS.some(e => e.date === dayIdx);
        
        let cls = "mini-day";
        if(isSelected) cls += " selected";
        if(hasEvent) cls += " has-event";
        
        html += `<div class="${cls}" ${isCurrentWeek ? `onclick="selectDate(${dayIdx})"` : ''}>${i}</div>`;
      }
      grid.innerHTML = html;
    }

    // ── DATE NAVIGATION ──
    function selectDate(idx) {
      if(idx < 0 || idx > 6) return;
      currentDateIdx = idx;
      updateHeaderDate();
      renderMiniCal();
      renderTimeline();
    }
    function changeDay(step) { selectDate(currentDateIdx + step); }
    function setToday() { selectDate(2); }

    function updateHeaderDate() {
      const dName = DAYS_STR[currentDateIdx];
      const dNum = DATES[currentDateIdx];
      document.getElementById('currentDateDisplay').textContent = `${dName}, ${dNum} April 2026`;
    }

    // ── RENDER TIMELINE ──
    function renderTimeHeaders() {
      const el = document.getElementById('tlHours');
      el.innerHTML = HOURS.map((h, i) => i < HOURS.length - 1 ? `<div class="tl-hour">${pad(h)}:00</div>` : '').join('');
    }

    function renderTimeline() {
      const minCap = parseInt(document.getElementById('capFilter').value) || 0;
      const checkedFloors = Array.from(document.querySelectorAll('.floor-item input:checked')).map(cb => cb.value);
      
      const filteredRooms = ROOMS.filter(r => r.cap >= minCap && checkedFloors.includes(r.floor));
      const body = document.getElementById('tlBody');
      let html = '';

      filteredRooms.forEach(room => {
        html += `
        <div class="tl-row">
          <div class="tl-room-info">
            <div class="tl-room-name">${room.name}</div>
            <div class="tl-room-meta">
              <span>👥 ${room.cap} org</span>
              <span class="room-floor-badge ${floorClass[room.floor]}">${room.floor}</span>
            </div>
          </div>
          <div class="tl-lanes" onclick="openBookingModal('${room.name}')">
            ${HOURS.map((h, i) => i < HOURS.length - 1 ? `<div class="tl-grid-line"></div>` : '').join('')}
        `;

        const todaysEvents = EVENTS.filter(e => e.room === room.name && e.date === currentDateIdx);
        todaysEvents.forEach(ev => {
          const startMins = (ev.startH - 8) * 60 + ev.startM;
          const durMins = (ev.endH - ev.startH) * 60 + (ev.endM - ev.startM);
          const leftPct = (startMins / TOTAL_MINS) * 100;
          const widthPct = (durMins / TOTAL_MINS) * 100;

          html += `
            <div class="tl-event ${colorClass[ev.color] || 'ev-blue'}" 
                 style="left:${leftPct}%; width:${widthPct}%;"
                 onclick="event.stopPropagation(); showPopover(event, ${ev.id})">
              <div class="ev-title">${ev.title}</div>
              <div class="ev-org">${ev.organizer}</div>
            </div>
          `;
        });

        html += `</div></div>`;
      });

      if(filteredRooms.length === 0) {
        html += `<div style="padding:40px; text-align:center; color:var(--text-muted); font-size:14px;">Tidak ada ruangan yang sesuai filter.</div>`;
      }

      // --- BAGIAN INDIKATOR WAKTU ("NOW LINE") YANG SUDAH DIPERBAIKI ---
      if (currentDateIdx === 2) {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();
        const mins = (h - 8) * 60 + m;
        const timeStr = `${pad(h)}:${pad(m)}`;

        if (mins >= 0 && mins <= TOTAL_MINS) {
          // Hanya inject 1 garis untuk seluruh tabel
          html += `
            <div class="now-indicator" style="left: calc(220px + (100% - 220px) * (${mins} / ${TOTAL_MINS}));">
              <div class="now-badge">🕒 Saat ini ${timeStr}</div>
            </div>
          `;
        }
      }

      body.innerHTML = html;
    }

    // ── BOOKING MODAL ──
    const TIME_SLOTS_LIST = [];
    for (let h = 8; h < 20; h++) {
      TIME_SLOTS_LIST.push({ label: `${pad(h)}:00`, h, m:0 });
      TIME_SLOTS_LIST.push({ label: `${pad(h)}:30`, h, m:30 });
    }
    TIME_SLOTS_LIST.push({ label:'20:00', h:20, m:0 });

    let selectedStart = null, selectedEnd = null;
    let modalTargetRoom = null;

    function openBookingModal(roomName = null) {
      modalTargetRoom = roomName || ROOMS[0].name;
      selectedStart = null; selectedEnd = null;
      
      document.getElementById('modalDateLabel').textContent = `${DAYS_STR[currentDateIdx]}, ${DATES[currentDateIdx]} April 2026`;
      document.getElementById('selectedRoomDisplay').value = modalTargetRoom;
      document.getElementById('meetTitle').value = '';
      
      renderTimeSlots();
      document.getElementById('bookingOverlay').classList.add('open');
    }

    function renderTimeSlots() {
      const el = document.getElementById('timeSlots');
      const bookedSlots = EVENTS.filter(e => e.room === modalTargetRoom && e.date === currentDateIdx).flatMap(e => {
        const slots = [];
        let h = e.startH, m = e.startM;
        while (h < e.endH || (h === e.endH && m < e.endM)) {
          slots.push(`${pad(h)}:${pad(m)}`);
          if (m === 0) m = 30; else { m = 0; h++; }
        }
        return slots;
      });

      el.innerHTML = TIME_SLOTS_LIST.slice(0, TIME_SLOTS_LIST.length - 1).map(s => {
        const isBooked = bookedSlots.includes(s.label);
        const isSel = (selectedStart !== null && selectedEnd !== null)
          ? isInRange(s, selectedStart, selectedEnd)
          : (selectedStart && s.label === selectedStart);
        return `<div class="time-chip${isBooked?' booked':''}${isSel?' selected':''}" onclick="${isBooked?'':''} selectTimeSlot('${s.label}',${isBooked})">${s.label}</div>`;
      }).join('');
    }

    function isInRange(slot, start, end) {
      const toMins = lbl => { const [h,m] = lbl.split(':').map(Number); return h*60+m; };
      return toMins(slot.label) >= toMins(start) && toMins(slot.label) < toMins(end);
    }

    function selectTimeSlot(label, isBooked) {
      if (isBooked) return;
      if (!selectedStart || (selectedStart && selectedEnd)) {
        selectedStart = label; selectedEnd = null;
      } else {
        const toMins = lbl => { const [h,m] = lbl.split(':').map(Number); return h*60+m; };
        if (toMins(label) > toMins(selectedStart)) selectedEnd = label;
        else { selectedEnd = selectedStart; selectedStart = label; }
      }
      renderTimeSlots();
    }

    function confirmBooking() {
      const title = document.getElementById('meetTitle').value.trim();
      if (!title || !selectedStart) { alert('Lengkapi judul dan waktu!'); return; }
      closeModal('bookingOverlay');
      showToast(`Booking "${title}" di ${modalTargetRoom} sukses!`);
    }

    // ── POPOVER & UTILS ──
    let popoverOpen = false;
    function showPopover(e, evId) {
      const ev = EVENTS.find(x => x.id === evId);
      if (!ev) return;
      const pop = document.getElementById('eventPopover');
      document.getElementById('popTitle').textContent = ev.title;
      document.getElementById('popRoom').textContent = `📍 ${ev.room}`;
      document.getElementById('popTime').textContent = `🕐 ${pad(ev.startH)}:${pad(ev.startM)} – ${pad(ev.endH)}:${pad(ev.endM)}`;
      document.getElementById('popOrg').textContent = ev.organizer;
      document.getElementById('popDiv').textContent = ev.division;
      document.getElementById('popAttendees').textContent = `👥 ${ev.attendees} peserta`;
      document.getElementById('popAvatar').style.background = `linear-gradient(135deg, ${ev.colorHex}, ${ev.colorHex}aa)`;
      document.getElementById('popAvatar').textContent = ev.organizer.split(' ').map(w=>w[0]).slice(0,2).join('');

      const headerCls = { blue:'pop-header-blue', purple:'pop-header-purple', teal:'pop-header-teal', green:'pop-header-green', amber:'pop-header-amber' };
      document.getElementById('popHeader').className = 'pop-header ' + (headerCls[ev.color] || 'pop-header-blue');

      const rect = e.target.getBoundingClientRect();
      let left = e.clientX + 10;
      let top = e.clientY + 10;
      if (left + 320 > window.innerWidth) left = window.innerWidth - 330;
      if (top + 250 > window.innerHeight) top = window.innerHeight - 260;
      pop.style.left = left + 'px';
      pop.style.top = top + 'px';
      pop.classList.add('open');
      popoverOpen = true;
    }

    function closePopover() { document.getElementById('eventPopover').classList.remove('open'); popoverOpen = false; }
    document.addEventListener('click', (e) => { if (popoverOpen && !e.target.closest('#eventPopover') && !e.target.closest('.tl-event')) closePopover(); });
    
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    function closeOnOverlay(e, id) { if (e.target.id === id) closeModal(id); }
    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    // Run
    init();
  </script>
</body>
</html>
